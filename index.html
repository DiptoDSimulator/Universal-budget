<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>DC Budgeting — Landing Page Patch Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=Hind+Siliguri:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --font-ui: 'Inter Tight', system-ui, sans-serif;
  --font-bn: 'Hind Siliguri', 'Inter Tight', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, monospace;
  --accent: oklch(0.85 0.18 120);
  --accent-ink: oklch(0.30 0.10 120);
  --accent-soft: oklch(0.85 0.18 120 / 0.14);
  --pos: oklch(0.78 0.16 150);
  --warn: oklch(0.78 0.15 70);
  --neg: oklch(0.70 0.18 25);
}
[data-theme="dark"],:root {
  --bg:oklch(0.17 0.008 80);--bg-1:oklch(0.21 0.009 80);--bg-2:oklch(0.24 0.010 80);--bg-3:oklch(0.28 0.011 80);
  --line:oklch(0.32 0.010 80);--line-soft:oklch(0.27 0.010 80);
  --ink:oklch(0.96 0.010 90);--ink-2:oklch(0.78 0.012 85);--ink-3:oklch(0.58 0.012 85);--ink-4:oklch(0.42 0.010 85);
}
[data-theme="light"] {
  --bg:oklch(0.985 0.004 85);--bg-1:oklch(1 0 0);--bg-2:oklch(0.965 0.005 85);--bg-3:oklch(0.94 0.006 85);
  --line:oklch(0.90 0.008 85);--line-soft:oklch(0.94 0.006 85);
  --ink:oklch(0.20 0.010 85);--ink-2:oklch(0.40 0.012 85);--ink-3:oklch(0.55 0.010 85);--ink-4:oklch(0.72 0.008 85);
  --accent-ink:oklch(0.32 0.12 120);--warn:oklch(0.68 0.16 60);--neg:oklch(0.60 0.18 25);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);color:var(--ink);font-family:var(--font-ui);min-height:100vh;}

/* ── LANDING PAGE ── */
#landingPage {
  min-height:100vh;background:var(--bg);display:flex;
  overflow-y:auto;padding:24px 16px 40px;
  flex-direction:column;align-items:center;
}
.landing-container { width:100%;max-width:960px;margin:0 auto; }
.landing-header {
  display:flex;align-items:center;gap:14px;margin-bottom:28px;
  padding-bottom:18px;border-bottom:1px solid var(--line);
}
.landing-avatar {
  width:44px;height:44px;border-radius:50%;background:var(--accent);
  color:oklch(0.25 0.08 120);font-family:var(--font-mono);font-weight:700;
  font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.landing-user-name { font-size:16px;font-weight:600;color:var(--ink); }
.landing-user-sub { font-size:12px;color:var(--ink-3);margin-top:2px; }
.landing-logo { margin-left:auto;display:flex;align-items:center;gap:8px; }
.landing-logo-mark {
  width:30px;height:30px;border-radius:8px;background:var(--accent);
  color:oklch(0.25 0.08 120);font-family:var(--font-mono);font-weight:700;
  font-size:14px;display:grid;place-items:center;
}
.landing-logo-text { font-family:var(--font-mono);font-size:12px;font-weight:600;color:var(--ink-3);letter-spacing:0.04em; }
.landing-grid { display:grid;grid-template-columns:1fr 1fr;gap:24px; }
.landing-section-label {
  font-family:var(--font-mono);font-size:10px;font-weight:600;
  text-transform:uppercase;letter-spacing:0.12em;color:var(--ink-3);margin-bottom:12px;
}
.landing-team-card {
  display:flex;align-items:center;gap:14px;padding:14px 16px;
  background:var(--bg-1);border:1.5px solid var(--line);border-radius:14px;
  cursor:pointer;transition:border-color .15s,background .15s;margin-bottom:8px;
}
.landing-team-card:hover { border-color:var(--accent);background:var(--bg-2); }
.landing-team-icon {
  width:44px;height:44px;border-radius:12px;background:var(--accent);
  color:oklch(0.25 0.08 120);font-family:monospace;font-weight:700;font-size:18px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.landing-team-body { flex:1;min-width:0; }
.landing-team-name { font-size:15px;font-weight:600;color:var(--ink);margin-bottom:2px; }
.landing-team-meta { font-size:11px;color:var(--ink-3); }
.landing-team-arrow { font-size:22px;color:var(--accent);font-weight:300;flex-shrink:0; }
.landing-actions { display:flex;flex-direction:column;gap:8px;margin-top:14px; }
.landing-action-btn {
  width:100%;padding:11px;background:transparent;border:1.5px dashed var(--line);
  border-radius:12px;font-family:var(--font-ui);font-size:13px;font-weight:500;
  color:var(--ink-3);cursor:pointer;transition:all .15s;
}
.landing-action-btn:hover { border-color:var(--accent);color:var(--accent); }
.landing-link { font-size:12px;color:var(--ink-3);cursor:pointer;text-decoration:underline;text-align:center;transition:color .15s; }
.landing-link:hover { color:var(--ink); }

/* Calendar */
.landing-cal-col { background:var(--bg-1);border:1px solid var(--line);border-radius:16px;padding:20px; }
.cal-header { display:flex;align-items:center;justify-content:space-between;margin-bottom:16px; }
.cal-nav-btn {
  width:34px;height:34px;border-radius:8px;border:1px solid var(--line);
  background:var(--bg-2);color:var(--ink);font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .15s;font-weight:300;
}
.cal-nav-btn:hover { border-color:var(--accent);color:var(--accent);background:var(--bg-3); }
.cal-title-wrap { display:flex;align-items:center;gap:8px; }
.cal-month-name { font-family:var(--font-bn);font-size:18px;font-weight:600;color:var(--ink);letter-spacing:-0.01em; }
.cal-year-sel {
  background:var(--bg-2);border:1px solid var(--line);border-radius:6px;
  color:var(--ink);font-family:var(--font-mono);font-size:12px;font-weight:600;
  padding:4px 8px;outline:none;cursor:pointer;
}
.cal-grid { display:grid;grid-template-columns:repeat(7,1fr);gap:2px; }
.cal-header-cell {
  text-align:center;font-family:var(--font-mono);font-size:10px;font-weight:600;
  color:var(--ink-3);padding:6px 0;letter-spacing:0.06em;text-transform:uppercase;
}
.cal-cell {
  position:relative;text-align:center;padding:8px 4px;border-radius:8px;
  min-height:38px;display:flex;flex-direction:column;align-items:center;
  justify-content:center;transition:background .12s;cursor:default;
}
.cal-cell:not(.cal-empty):hover { background:var(--bg-2); }
.cal-day-num { font-family:var(--font-mono);font-size:13px;font-weight:500;color:var(--ink-2); }
.cal-today { background:var(--accent) !important;border-radius:8px; }
.cal-today .cal-day-num { color:oklch(0.25 0.08 120) !important;font-weight:700; }
.cal-holiday .cal-day-num { color:var(--neg);font-weight:600; }
.cal-today.cal-holiday .cal-day-num { color:oklch(0.25 0.08 120); }
.cal-friday .cal-day-num { color:var(--accent); }
.cal-today.cal-friday .cal-day-num { color:oklch(0.25 0.08 120); }
.cal-holiday-dot { width:4px;height:4px;border-radius:50%;background:var(--neg);position:absolute;bottom:3px; }
.cal-today .cal-holiday-dot { background:oklch(0.25 0.08 120); }
.cal-holiday-list { margin-top:16px;border-top:1px solid var(--line);padding-top:12px; }
.cal-holiday-item { display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--line-soft); }
.cal-holiday-item:last-child { border-bottom:none; }
.cal-holiday-date {
  width:28px;height:28px;border-radius:7px;background:oklch(0.70 0.18 25 / 0.12);
  color:var(--neg);font-family:var(--font-mono);font-size:12px;font-weight:700;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.cal-holiday-name { font-size:13px;color:var(--ink-2);font-family:var(--font-bn); }
.cal-no-holidays { margin-top:14px;text-align:center;font-size:12px;color:var(--ink-4);font-family:var(--font-mono);padding:8px 0; }

/* Theme toggle for demo */
.demo-theme-toggle {
  position:fixed;top:12px;right:12px;padding:8px 14px;background:var(--bg-2);
  border:1px solid var(--line);border-radius:8px;color:var(--ink-3);font-size:12px;
  font-family:var(--font-mono);cursor:pointer;z-index:10;
}
.demo-lang-toggle {
  position:fixed;top:12px;right:120px;padding:8px 14px;background:var(--bg-2);
  border:1px solid var(--line);border-radius:8px;color:var(--ink-3);font-size:12px;
  font-family:var(--font-mono);cursor:pointer;z-index:10;
}

@media(max-width:768px) {
  .landing-grid { grid-template-columns:1fr;gap:16px; }
  .landing-cal-col { padding:16px; }
  #landingPage { padding:16px 12px 32px; }
  .cal-cell { min-height:32px;padding:6px 2px; }
  .cal-day-num { font-size:12px; }
}
</style>
</head>
<body data-theme="dark">

<button class="demo-theme-toggle" onclick="toggleDemoTheme()">☀️ Toggle Theme</button>
<button class="demo-lang-toggle" onclick="toggleDemoLang()">🌐 EN / বাংলা</button>

<div id="landingPage">
  <div class="landing-container">
    <div class="landing-header">
      <div class="landing-avatar">D</div>
      <div>
        <div class="landing-user-name">Dipto Chakrabarti</div>
        <div class="landing-user-sub" id="landingUserSub">Choose a team to continue</div>
      </div>
      <div class="landing-logo">
        <div class="landing-logo-mark">৳</div>
        <div class="landing-logo-text">DC Budgeting</div>
      </div>
    </div>
    <div class="landing-grid">
      <div class="landing-teams-col">
        <div class="landing-section-label">Your Teams</div>
        <div id="landingTeamList">
          <div class="landing-team-card" onclick="alert('Would open DChitra team')">
            <div class="landing-team-icon">D</div>
            <div class="landing-team-body">
              <div class="landing-team-name">DChitra</div>
              <div class="landing-team-meta">1 member · Owner</div>
            </div>
            <div class="landing-team-arrow">›</div>
          </div>
          <div class="landing-team-card" onclick="alert('Would open Personal Expenses team')">
            <div class="landing-team-icon">P</div>
            <div class="landing-team-body">
              <div class="landing-team-name">Personal Expenses</div>
              <div class="landing-team-meta">1 member · Owner</div>
            </div>
            <div class="landing-team-arrow">›</div>
          </div>
          <div class="landing-team-card" onclick="alert('Would open Trip Plan team')">
            <div class="landing-team-icon">T</div>
            <div class="landing-team-body">
              <div class="landing-team-name">Trip Plan</div>
              <div class="landing-team-meta">1 member · Owner</div>
            </div>
            <div class="landing-team-arrow">›</div>
          </div>
        </div>
        <div class="landing-actions">
          <button class="landing-action-btn">＋ Create or join another team</button>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px;margin-top:14px;">
          <span class="landing-link">🗂 View archived teams</span>
          <span class="landing-link">Sign out</span>
        </div>
      </div>
      <div class="landing-cal-col">
        <div class="landing-section-label" id="calSectionLabel">Calendar · Bangladesh Holidays</div>
        <div id="landingCalendar"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ── DEMO HELPERS ──
let currentLang = "en";

function toggleDemoTheme() {
  const curr = document.body.getAttribute("data-theme");
  document.body.setAttribute("data-theme", curr === "dark" ? "light" : "dark");
}
function toggleDemoLang() {
  currentLang = currentLang === "en" ? "bn" : "en";
  document.getElementById("calSectionLabel").textContent = 
    currentLang === "bn" ? "ক্যালেন্ডার · বাংলাদেশ সরকারি ছুটি" : "Calendar · Bangladesh Holidays";
  document.getElementById("landingUserSub").textContent =
    currentLang === "bn" ? "একটা টিম সিলেক্ট করো" : "Choose a team to continue";
  renderLandingCalendar();
}

// ── BANGLADESH PUBLIC HOLIDAYS ──
const BD_HOLIDAYS = {
  fixed: [
    { m:1, d:21, name:"International Mother Language Day", namebn:"আন্তর্জাতিক মাতৃভাষা দিবস" },
    { m:2, d:17, name:"Sheikh Mujibur Rahman's Birthday", namebn:"বঙ্গবন্ধুর জন্মদিন" },
    { m:2, d:26, name:"Independence Day", namebn:"স্বাধীনতা দিবস" },
    { m:3, d:14, name:"Bengali New Year (Pohela Boishakh)", namebn:"পহেলা বৈশাখ" },
    { m:4, d:1, name:"May Day", namebn:"মে দিবস" },
    { m:7, d:15, name:"National Mourning Day", namebn:"জাতীয় শোক দিবস" },
    { m:11, d:16, name:"Victory Day", namebn:"বিজয় দিবস" },
    { m:11, d:25, name:"Christmas", namebn:"বড়দিন" },
    { m:0, d:1, name:"New Year's Day", namebn:"নববর্ষ" },
  ],
  islamic2025: [
    { m:0, d:27, name:"Shab-e-Meraj", namebn:"শবে মেরাজ" },
    { m:2, d:14, name:"Shab-e-Barat", namebn:"শবে বরাত" },
    { m:2, d:30, name:"Eid-ul-Fitr", namebn:"ঈদুল ফিতর" },
    { m:2, d:31, name:"Eid-ul-Fitr (2nd day)", namebn:"ঈদুল ফিতর (২য় দিন)" },
    { m:3, d:1, name:"Eid-ul-Fitr (3rd day)", namebn:"ঈদুল ফিতর (৩য় দিন)" },
    { m:5, d:7, name:"Eid-ul-Adha", namebn:"ঈদুল আযহা" },
    { m:5, d:8, name:"Eid-ul-Adha (2nd day)", namebn:"ঈদুল আযহা (২য় দিন)" },
    { m:5, d:9, name:"Eid-ul-Adha (3rd day)", namebn:"ঈদুল আযহা (৩য় দিন)" },
    { m:6, d:6, name:"Ashura", namebn:"আশুরা" },
    { m:8, d:5, name:"Eid-e-Milad-un-Nabi", namebn:"ঈদে মিলাদুন্নবী" },
  ],
  islamic2026: [
    { m:0, d:16, name:"Shab-e-Meraj", namebn:"শবে মেরাজ" },
    { m:2, d:4, name:"Shab-e-Barat", namebn:"শবে বরাত" },
    { m:2, d:20, name:"Eid-ul-Fitr", namebn:"ঈদুল ফিতর" },
    { m:2, d:21, name:"Eid-ul-Fitr (2nd day)", namebn:"ঈদুল ফিতর (২য় দিন)" },
    { m:2, d:22, name:"Eid-ul-Fitr (3rd day)", namebn:"ঈদুল ফিতর (৩য় দিন)" },
    { m:4, d:27, name:"Eid-ul-Adha", namebn:"ঈদুল আযহা" },
    { m:4, d:28, name:"Eid-ul-Adha (2nd day)", namebn:"ঈদুল আযহা (২য় দিন)" },
    { m:4, d:29, name:"Eid-ul-Adha (3rd day)", namebn:"ঈদুল আযহা (৩য় দিন)" },
    { m:5, d:26, name:"Ashura", namebn:"আশুরা" },
    { m:7, d:25, name:"Eid-e-Milad-un-Nabi", namebn:"ঈদে মিলাদুন্নবী" },
  ],
  hindu: [
    { m:9, d:2, name:"Durga Puja (Vijaya Dashami)", namebn:"দুর্গাপূজা (বিজয়া দশমী)", year:2025 },
    { m:9, d:21, name:"Durga Puja (Vijaya Dashami)", namebn:"দুর্গাপূজা (বিজয়া দশমী)", year:2026 },
  ],
  buddhist: [
    { m:4, d:12, name:"Buddha Purnima", namebn:"বুদ্ধ পূর্ণিমা", year:2025 },
    { m:4, d:1, name:"Buddha Purnima", namebn:"বুদ্ধ পূর্ণিমা", year:2026 },
  ],
};

function getHolidaysForMonth(year, month) {
  const results = [];
  BD_HOLIDAYS.fixed.forEach(h => { if (h.m === month) results.push({ day:h.d, name:h.name, namebn:h.namebn }); });
  const ik = "islamic" + year;
  if (BD_HOLIDAYS[ik]) BD_HOLIDAYS[ik].forEach(h => { if (h.m === month) results.push({ day:h.d, name:h.name, namebn:h.namebn }); });
  BD_HOLIDAYS.hindu.forEach(h => { if (h.year === year && h.m === month) results.push({ day:h.d, name:h.name, namebn:h.namebn }); });
  BD_HOLIDAYS.buddhist.forEach(h => { if (h.year === year && h.m === month) results.push({ day:h.d, name:h.name, namebn:h.namebn }); });
  results.sort((a,b) => a.day - b.day);
  return results;
}

let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth();

function renderLandingCalendar() {
  const container = document.getElementById("landingCalendar");
  if (!container) return;

  const now = new Date();
  const todayStr = `${now.getFullYear()}-${now.getMonth()}-${now.getDate()}`;
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const holidays = getHolidaysForMonth(calYear, calMonth);
  const holidayMap = {};
  holidays.forEach(h => { if (!holidayMap[h.day]) holidayMap[h.day] = []; holidayMap[h.day].push(h); });

  const monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  const monthNamesBn = ["জানুয়ারি","ফেব্রুয়ারি","মার্চ","এপ্রিল","মে","জুন","জুলাই","আগস্ট","সেপ্টেম্বর","অক্টোবর","নভেম্বর","ডিসেম্বর"];
  const dayHeaders = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const dayHeadersBn = ["রবি","সোম","মঙ্গল","বুধ","বৃহ","শুক্র","শনি"];

  const useBn = currentLang === "bn";
  const mName = useBn ? monthNamesBn[calMonth] : monthNames[calMonth];
  const dHeaders = useBn ? dayHeadersBn : dayHeaders;

  let yearOpts = "";
  for (let y = 2024; y <= 2030; y++) yearOpts += `<option value="${y}" ${y===calYear?"selected":""}>${y}</option>`;

  let cells = "";
  for (let i = 0; i < firstDay; i++) cells += `<div class="cal-cell cal-empty"></div>`;
  for (let d = 1; d <= daysInMonth; d++) {
    const isToday = `${calYear}-${calMonth}-${d}` === todayStr;
    const isHoliday = holidayMap[d];
    const isFriday = new Date(calYear, calMonth, d).getDay() === 5;
    let cls = "cal-cell";
    if (isToday) cls += " cal-today";
    if (isHoliday) cls += " cal-holiday";
    if (isFriday) cls += " cal-friday";
    const tooltip = isHoliday ? isHoliday.map(h => useBn ? h.namebn : h.name).join(", ") : "";
    cells += `<div class="${cls}" ${tooltip ? `title="${tooltip}"` : ""}>
      <span class="cal-day-num">${d}</span>
      ${isHoliday ? `<span class="cal-holiday-dot"></span>` : ""}
    </div>`;
  }

  let holidayList = "";
  if (holidays.length > 0) {
    holidayList = `<div class="cal-holiday-list">${holidays.map(h => `<div class="cal-holiday-item">
        <span class="cal-holiday-date">${h.day}</span>
        <span class="cal-holiday-name">${useBn ? h.namebn : h.name}</span>
      </div>`).join("")}</div>`;
  } else {
    holidayList = `<div class="cal-no-holidays">${useBn ? "এই মাসে কোনো সরকারি ছুটি নেই" : "No public holidays this month"}</div>`;
  }

  container.innerHTML = `
    <div class="cal-header">
      <button class="cal-nav-btn" onclick="calPrev()">‹</button>
      <div class="cal-title-wrap">
        <span class="cal-month-name">${mName}</span>
        <select class="cal-year-sel" onchange="calYearChange(this.value)">${yearOpts}</select>
      </div>
      <button class="cal-nav-btn" onclick="calNext()">›</button>
    </div>
    <div class="cal-grid">
      ${dHeaders.map(d => `<div class="cal-header-cell">${d}</div>`).join("")}
      ${cells}
    </div>
    ${holidayList}`;
}

function calPrev() { calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; } renderLandingCalendar(); }
function calNext() { calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; } renderLandingCalendar(); }
